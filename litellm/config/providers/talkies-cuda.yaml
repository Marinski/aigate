# Qwen3-TTS voice cloning, inside talkies-cuda as of v0.4.0. Sample
# voices `alloy`/`echo`/`fable` ship in-image; drop your own
# `<name>.wav` into ${DATA_DIR_TALKIES}/custom-voices/ on the host and
# use `voice=<name>` (nested paths e.g. `clients/acme/jane` supported).
- model_name: local-talkies-cuda-qwen3-tts
  litellm_params:
    model: openai/qwen3-tts-0.6b
    api_base: http://talkies-cuda:8000/v1
    api_key: none
  model_info:
    mode: audio_speech

# Qwen3-TTS v0.8.0 mode coverage. Mode is implicit in the model slug;
# `voice` and `instructions` semantics shift per mode:
#   1.7b           — Base voice cloning (reference-WAV path as `voice`)
#   0.6b-custom    — CustomVoice (9 preset speakers as `voice`)
#   1.7b-custom    — CustomVoice + emotion as `instructions`
#   1.7b-design    — VoiceDesign (NL description as `instructions`)
# GET /v1/audio/voices returns the right shape per mode.
- model_name: local-talkies-cuda-qwen3-tts-1.7b
