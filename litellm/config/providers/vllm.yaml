# vllm CPU — text LLMs and embeddings served via supervised `vllm serve`
# (vllm-openai-cpu base). Only one model is resident in RAM at a time — the
# wrapper restarts vllm-serve when switching. The LiteLLM resource_manager
# evicts vllm whenever a competing CPU job (ollama / sdcpp / talkies-cpu)
# arrives.

# ── Nomic Embed v2 (MoE, 305M active) ─────────────────────────────────────

- model_name: local-vllm-nomic-embed-v2
  litellm_params:
    model: openai/nomic-embed-v2
    api_base: http://vllm:8000/v1
    api_key: none
  model_info:
    mode: embedding

# ── Qwen3 0.6B (chat + completions) ───────────────────────────────────────

- model_name: local-vllm-qwen3-0.6b
  litellm_params:
    model: openai/qwen3-0.6b
    api_base: http://vllm:8000/v1
    api_key: none
  model_info:
    mode: chat
