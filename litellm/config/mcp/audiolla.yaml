audiolla:
  url: "http://audiolla:8000/v1/mcp/"
  transport: "http"
  auth_type: "bearer_token"
  auth_value: os.environ/AUDIOLLA_AUTH_TOKEN
  # FastMCP's DNS-rebinding protection rejects requests whose Host header
  # isn't in its allowlist (default: localhost / 127.0.0.1). Without this
  # override, LiteLLM sends Host: audiolla:8000 (compose service name)
  # and FastMCP returns 421 Misdirected Request. Spoofing Host: 127.0.0.1
  # gets us past the check; the request is already inside aigate-internal
  # so no actual rebinding risk.
  static_headers:
    Host: "127.0.0.1:8000"
  description: "Self-hosted audio-production API (v1.0.1+). 80+ MCP tools across stem separation, restoration, mastering, MIR analysis, DSP transforms, loudness, speech enhancement, diarization, MIDI transcription + composition, plus 5 text-to-audio generators on the CUDA variant (stable-audio-open / musicgen-small / musicgen-medium [CC-BY-NC, gated on AUDIOLLA_ENABLE_NONCOMMERCIAL=1] / riffusion / audioldm2 [CC-BY 4.0, no gate]). API contract (breaking from v0.23.x): every audio endpoint takes a JSON body; raw bytes only at PUT /v1/files/{path}. Audio-producing tools require output_path (stages under FILES_DIR — caller fetches via /v1/files) XOR output_url (server PUTs to a presigned URL). The `*_base64` response fields are gone — pull staged results via /v1/files. Tools include: separate, master, analyze, beats, onsets, melody, segments, chords, vad, diarize, restore, denoise, audio_to_midi, enhance, transform, normalize, hpss, stretch, pitch_correct, tag, embed, classify, fingerprint, info, trim, mix, concat, convert, similar, fade, reverse, loop, speed, bpm_match, key_match, stereo_width, split, pan, eq, sidechain_duck, fx, midi_compose/inspect/transform/render/generate, drum_pattern, chords_to_midi, audio_metadata, detect_clipping, mid_side, conv_reverb, transient_shaper, multiband_compress, dj_prep, find_loop_point, de_ess, stereo_field, audio_thumbnail, midi_humanize, and the new `generate_<engine>` family. Workflow surface: list_presets / describe_preset / run_preset (curated YAML chains: master-for-spotify, podcast-cleanup, vocal-cleanup), list_ops / run_pipeline_tool (ad-hoc op chains run server-side, intermediates stay in memory). Async: list_jobs / get_job / cancel_job. Staging: list_files / put_file / get_file / delete_file. See github.com/psyb0t/docker-audiolla README for full per-tool params and the openapi.yaml contract."
