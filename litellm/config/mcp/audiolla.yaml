audiolla:
  url: "http://audiolla:8000/v1/mcp/"
  transport: "http"
  auth_type: "bearer_token"
  auth_value: os.environ/AUDIOLLA_AUTH_TOKEN
  # FastMCP's DNS-rebinding protection rejects requests whose Host header
  # isn't in its allowlist (default: localhost / 127.0.0.1). Without this
  # override, LiteLLM sends Host: audiolla:8000 (compose service name) and
  # FastMCP returns 421 Misdirected Request. Spoofing Host: localhost gets
  # us past the check; the request is already inside aigate-internal so no
  # actual rebinding risk.
  static_headers:
    Host: "127.0.0.1:8000"
  description: "Self-hosted audio-production API — 80+ MCP tools across stem separation, restoration, mastering, MIR analysis, DSP transforms, loudness, speech enhancement, diarization, MIDI transcription + composition. Audio output modes: default base64, output_path (stages under FILES_DIR for follow-up tools), output_url (PUT to a presigned URL). Tools include: separate, master, analyze, beats, onsets, melody, segments, chords, vad, diarize, restore, denoise, audio_to_midi, enhance, transform, normalize, hpss, stretch, pitch_correct, tag, embed, classify, fingerprint, info, trim, mix, concat, convert, similar, fade, reverse, loop, speed, bpm_match, key_match, stereo_width, split, pan, eq, sidechain_duck, fx, midi_compose/inspect/transform/render/generate, drum_pattern, chords_to_midi, audio_metadata, detect_clipping, mid_side, conv_reverb, transient_shaper, multiband_compress, dj_prep, find_loop_point. Workflow surface: list_presets / describe_preset / run_preset (curated YAML chains: master-for-spotify, podcast-cleanup, vocal-cleanup), list_ops / run_pipeline_tool (ad-hoc op chains run server-side, intermediates stay in memory). Async: list_jobs / get_job / cancel_job. Staging: list_files / put_file / get_file / delete_file. See github.com/psyb0t/docker-audiolla README for full per-tool params."
