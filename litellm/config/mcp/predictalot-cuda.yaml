predictalot_cuda:
  url: "http://predictalot-cuda:8080/mcp/"
  transport: "http"
  auth_type: "bearer_token"
  auth_value: os.environ/PREDICTALOT_AUTH_TOKEN
  # FastMCP's DNS-rebinding protection rejects Host headers outside its
  # allowlist (default: localhost / 127.0.0.1). Without this override
  # LiteLLM sends Host: predictalot-cuda:8080 → 421 Misdirected Request.
  static_headers:
    Host: "127.0.0.1:8080"
  description: "Time-series forecasting (NVIDIA GPU variant of predictalot). Same model + tool set as the CPU `predictalot` MCP — see that fragment's description for the full per-tool list. Use this when you want a forced-GPU path; use `predictalot` when CPU is enough. Both share ${DATA_DIR_PREDICTALOT}/models so cached HF snapshots are reused across variants. Tools namespaced as `predictalot_cuda-<tool>` in the aggregated /mcp/. Same v1.0.0 caveat as the CPU fragment: the new /v1/tabular/* family is REST-only (not yet MCP-wrapped upstream)."
