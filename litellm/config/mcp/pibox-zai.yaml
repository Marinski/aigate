pibox_zai:
  url: "http://pibox-zai:8080/mcp/"
  transport: "http"
  auth_type: "bearer_token"
  auth_value: os.environ/PIBOX_ZAI_API_TOKEN
  static_headers:
    Host: "localhost:8080"
  description: "pi-coding-agent (z.ai GLM) — run agentic tasks, read/write/upload/delete workspace files. Tools: pi_run, read_file, write_file, list_files, delete_file."
