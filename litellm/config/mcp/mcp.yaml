mcp_tools:
  url: "http://mcp:8000/mcp"
  transport: "http"
  auth_type: "bearer_token"
  auth_value: os.environ/MCP_TOOLS_AUTH_TOKEN
  description: "Media generation + web search. Create images (FLUX, DALL-E, Stable Diffusion), text-to-speech audio (Kokoro, Qwen3, OpenAI TTS), and search the web via SearXNG. Tools: generate_image, generate_tts, search_web. Each tool is registered only when its backing provider is enabled (image models / TTS models / SEARXNG)."
