general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_PASSWORD
    ttl: 600

  telemetry: false
  # Effectively unbounded — long CPU transcriptions can take hours, long
  # context completions on slow upstreams can take many minutes. We rely
  # on the *client* to cancel if it doesn't want to wait, not on a server
  # cutoff that murders in-progress inference.
  request_timeout: 86400
  drop_params: true

  # Forward `x-*` client headers to upstream LLM APIs. Enables aigate
  # callers to pass aicodebox / claudebox / pibox-specific knobs that
  # those upstreams read off headers rather than the JSON body:
  #   x-aicodebox-workspace          (also: x-claude-workspace)
  #   x-aicodebox-continue           (also: x-claude-continue)
  #   x-aicodebox-append-system-prompt (also: x-claude-append-system-prompt)
  # LiteLLM's allowlist forwards x-* headers only, never Authorization
  # (master key stays on the LiteLLM side, upstream gets its own creds).
  forward_client_headers_to_llm_api: true

litellm_settings:
  drop_params: true
  num_retries: 3
  request_timeout: 86400
  enable_json_schema_validation: true
  callbacks: ["callbacks.resource_manager.proxy_handler_instance"]

router_settings:
  routing_strategy: latency-based-routing
  num_retries: 3
  timeout: 86400
  retry_after: 5
